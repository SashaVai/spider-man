<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-man</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="site-container">
        <header class="header">
            <h1 class="header__title">spider man into the spider verse</h1>
        </header>
        <main class="main">
            <div class="main__item main_morales">
                <h2 class="main__text main_morales-text">Майлз</h2>
            </div>
            <div class="main__item main_gwen">
                <h2 class="main__text main_gwen-text">Гвен Стейси</h2>
            </div>
            <div class="main__item main_parker">
                <h2 class="main__text main_parker-text">Питер<br>Паркер</h2>
            </div>
            <div class="main__item main_pig">
                <h2 class="main__text main_pig-text">Спайдер<br>Пиг</h2>
            </div>
            <div class="main__item main_noir">
                <h2 class="main__text main_noir-text">Паук Нуар</h2>
            </div>
            <div class="main__item main_penni">
                <h2 class="main__text main_penni-text">Пенни паркер</h2>
            </div>
            <div class="main__item main_robot">
                <h2 class="main__text main_robot-text">и ее Робо-паук</h2>
            </div>
            <div class="main__item main_trio">
                <h2 class="main__text main_trio-text">Все они из разных вселенных.</h2>
            </div>
            <div class="main__item main_all-team">
                <h2 class="main__text main_all-team-text">Но должны объедениться, чтобы спасти мир</h2>
            </div>
            <div class="main__item main_versus">
                <h2 class="main__text main_versus-text">и победить Кингпина.</h2>
            </div>
            <div class="main__item main_kingpin"></div>
            <div class="main__item main_free-fall"></div>
        </main>
    </div>
</body>
</html>
